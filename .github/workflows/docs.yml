name: documentation

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: write

jobs:
  docs:
    permissions:
      pages: write
      id-token: write
    environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Install dependencies
        run: |
          pip install sphinx-rtd-theme sphinx-click readthedocs-sphinx-search sphinxcontrib.bibtex sphinx-toolbox quantnet-mq quantnet-agent quantnet-server
      - name: Sphinx build
        run: |
          make html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/gh-pages' }}
        with:
          path: _build/html
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
